version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: log_postgres
    environment:
      POSTGRES_DB: logsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: log_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  logservice:
    build:
      context: ./GraNAS.LogService/
      dockerfile: Dockerfile
    container_name: log_service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=logsdb;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
    ports:
      - "5002:80"
    restart: unless-stopped

  react-ui:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: log_ui
    ports:
      - "3000:80"
    depends_on:
      - logservice
    environment:
      - REACT_APP_API_URL=http://localhost:5002/api
    restart: unless-stopped

volumes:
  postgres_data:
