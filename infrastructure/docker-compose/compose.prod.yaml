# Prod overrides on top of compose.yaml.
# Usage:
#   docker compose --env-file prod.env -f compose.yaml -f compose.prod.yaml up -d
#
# All secrets/ports live in prod.env. Never commit a real prod.env.

services:
  auth-service:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    restart: always

  metadata-service:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    restart: always

  log-service:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    restart: always

  opensearch:
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS}
      - DISABLE_SECURITY_PLUGIN=true
