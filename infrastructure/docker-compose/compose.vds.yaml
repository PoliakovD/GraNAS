# VDS overlay: HTTPS via nginx + certbot, все внутренние порты закрыты.
# Использование:
#   docker compose --env-file vds.env -f compose.yaml -f compose.vds.yaml up -d

services:

  # ----- Закрываем все внутренние порты (не нужны снаружи) -----
  postgres-auth:
    ports: []
  postgres-metadata:
    ports: []
  postgres-sharing:
    ports: []
  postgres-signaling:
    ports: []
  postgres-notification:
    ports: []
  redis:
    ports: []
  rabbitmq:
    ports: []
  opensearch:
    ports: []
  auth-service:
    ports: []
  metadata-service:
    ports: []
  log-service:
    ports: []
  sharing-service:
    ports: []
  signaling-service:
    ports: []
  notification-service:
    ports: []
  api-gateway:
    ports: []
  web-client:
    ports: []
  mailpit:
    ports: []

  # ----- Nginx: TLS-терминация + прокси -----
  nginx:
    image: nginx:1.27-alpine
    container_name: ${PREFIX}_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/app.conf.template:/etc/nginx/templates/app.conf.template:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    environment:
      DOMAIN: ${DOMAIN}
      NGINX_ENVSUBST_TEMPLATE_VARIABLES: DOMAIN
    depends_on:
      - web-client
      - api-gateway
      - opensearch-dashboards
    restart: unless-stopped
    networks:
      - app-network

  # ----- OpenSearch Dashboards (доступны через nginx /_dashboards/) -----
  opensearch-dashboards:
    container_name: ${PREFIX}_opensearch_dashboards
    image: opensearchproject/opensearch-dashboards:${OPENSEARCH_VERSION}
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
      SERVER_BASEPATH: /_dashboards
      SERVER_REWRITEBASEPATH: "true"
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  # ----- Dashboards init: импорт saved-objects (запускается один раз) -----
  dashboards-init:
    image: curlimages/curl:8.10.1
    container_name: ${PREFIX}_dashboards_init
    depends_on:
      opensearch-dashboards:
        condition: service_started
    volumes:
      - ./dashboards/granas-debug.ndjson:/work/granas-debug.ndjson:ro
      - ./dashboards/init.sh:/work/init.sh:ro
    entrypoint: ["/bin/sh", "/work/init.sh"]
    restart: "no"
    networks:
      - app-network

  # ----- Certbot: автообновление сертификата -----
  certbot:
    image: certbot/certbot:v3.2.0
    container_name: ${PREFIX}_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Проверяет обновление каждые 12 часов
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done;'"
    restart: unless-stopped

volumes:
  certbot_www:
  certbot_certs:
