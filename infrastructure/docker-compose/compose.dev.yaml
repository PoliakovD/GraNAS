# Dev overrides on top of compose.yaml.
# Usage:
#   docker compose --env-file dev.env -f compose.yaml -f compose.dev.yaml up -d

services:
  auth-service:
    environment:
      DOTNET_USE_POLLING_FILE_WATCHER: ${DOTNET_USE_POLLING_FILE_WATCHER}
      Serilog__MinimumLevel__Default: Debug
    volumes:
      - ../../services/auth-service:/src/services/auth-service
      - ~/.nuget/packages:/root/.nuget/packages
      - ~/.dotnet:/root/.dotnet

  metadata-service:
    environment:
      DOTNET_USE_POLLING_FILE_WATCHER: ${DOTNET_USE_POLLING_FILE_WATCHER}
      Serilog__MinimumLevel__Default: Debug
    volumes:
      - ../../services/metadata-service:/src/services/metadata-service
      - ~/.nuget/packages:/root/.nuget/packages
      - ~/.dotnet:/root/.dotnet

  log-service:
    environment:
      DOTNET_USE_POLLING_FILE_WATCHER: ${DOTNET_USE_POLLING_FILE_WATCHER}
      Serilog__MinimumLevel__Default: Debug
    volumes:
      - ../../services/log-service:/src/services/log-service
      - ~/.nuget/packages:/root/.nuget/packages
      - ~/.dotnet:/root/.dotnet

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:${OPENSEARCH_VERSION}
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
      SERVER_BASEPATH: /_dashboards
      SERVER_REWRITEBASEPATH: "true"
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - app-network

  dashboards-init:
    image: curlimages/curl:8.10.1
    depends_on:
      opensearch-dashboards:
        condition: service_started
    volumes:
      - ./dashboards/granas-debug.ndjson:/work/granas-debug.ndjson:ro
      - ./dashboards/init.sh:/work/init.sh:ro
    entrypoint: ["/bin/sh", "/work/init.sh"]
    restart: "no"
    networks:
      - app-network

  sharing-service:
    environment:
      Serilog__MinimumLevel__Default: Debug

  signaling-service:
    environment:
      Serilog__MinimumLevel__Default: Debug

  notification-service:
    environment:
      Serilog__MinimumLevel__Default: Debug
      Smtp__Host: mailpit
      Smtp__Port: 1025
      Smtp__UseStartTls: "false"
      # Generate once: npx web-push generate-vapid-keys
      # Then set WEBPUSH__PUBLICKEY and WEBPUSH__PRIVATEKEY in .env.dev
      WebPush__PublicKey: ${WEBPUSH_PUBLIC_KEY:-}
      WebPush__PrivateKey: ${WEBPUSH_PRIVATE_KEY:-}
      WebPush__Subject: "mailto:admin@granasapp.com"
      WebClient__BaseUrl: "http://localhost:5173"

  api-gateway:
    environment:
      Serilog__MinimumLevel__Default: Debug

