services:
  postgres-auth:
    container_name: ${PREFIX}_postgres_auth
    image: postgres:${POSTGRES_VERSION}
    environment:
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
    ports:
      - "${AUTH_POSTGRES_PORT_HOST}:${POSTGRES_PORT_CONTAINER}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AUTH_POSTGRES_USER} -d ${AUTH_POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    networks:
      - db-network
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

  postgres-metadata:
    container_name: ${PREFIX}_postgres_metadata
    image: postgres:${POSTGRES_VERSION}
    environment:
      POSTGRES_DB: ${METADATA_POSTGRES_DB}
      POSTGRES_USER: ${METADATA_POSTGRES_USER}
      POSTGRES_PASSWORD: ${METADATA_POSTGRES_PASSWORD}
    ports:
      - "${METADATA_POSTGRES_PORT_HOST}:${POSTGRES_PORT_CONTAINER}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${METADATA_POSTGRES_USER} -d ${METADATA_POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    networks:
      - db-network
    volumes:
      - postgres_metadata_data:/var/lib/postgresql/data

  redis:
    container_name: ${PREFIX}_redis
    image: redis:${REDIS_VERSION}
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT_HOST}:${REDIS_PORT_CONTAINER}"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - db-network
    volumes:
      - redis_data:/data

  elasticsearch:
    container_name: ${PREFIX}_elasticsearch
    image: elasticsearch:${ELASTIC_VERSION}
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
      - xpack.security.enabled=false
      - http.cors.enabled=true
      - http.cors.allow-origin="*"
      - http.cors.allow-headers=X-Requested-With,X-Auth-Token,Content-Type,Content-Length,Authorization
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: [ "CMD-SHELL", "curl --silent --fail http://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    networks:
      - app-network
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTIC_PORT_HOST}:${ELASTIC_PORT_CONTAINER}"

  rabbitmq:
    container_name: ${PREFIX}_rabbitmq
    image: rabbitmq:${RABBITMQ_VERSION}-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - messaging-network
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_AMQP_PORT_HOST}:${RABBITMQ_AMQP_PORT_CONTAINER}"
      - "${RABBITMQ_MANAGEMENT_PORT_HOST}:${RABBITMQ_MANAGEMENT_PORT_CONTAINER}"

  auth-service:
    container_name: ${PREFIX}_auth_service
    build:
      context: ../..
      dockerfile: services/auth-service/GraNAS.Auth.API/Dockerfile
    image: ${AUTH_SERVICE_IMAGE}:${AUTH_SERVICE_VERSION}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      ASPNETCORE_URLS: http://+:${SERVICE_PORT_CONTAINER}
      ConnectionStrings__Default: ${AUTH_DB_CONNECTION_STRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__AccessTokenExpirationMinutes: ${JWT_ACCESS_MINUTES}
      Jwt__RefreshTokenExpirationDays: ${JWT_REFRESH_DAYS}
      Elasticsearch__Uri: ${ELASTIC_URI}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_DEFAULT_USER}
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${AUTH_SERVICE_PORT_HOST}:${SERVICE_PORT_CONTAINER}"
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - app-network
      - db-network
      - messaging-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${SERVICE_PORT_CONTAINER}/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s

  metadata-service:
    container_name: ${PREFIX}_metadata_service
    build:
      context: ../..
      dockerfile: services/metadata-service/GraNAS.Metadata.API/Dockerfile
    image: ${METADATA_SERVICE_IMAGE}:${METADATA_SERVICE_VERSION}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      ASPNETCORE_URLS: http://+:${SERVICE_PORT_CONTAINER}
      ConnectionStrings__Default: ${METADATA_DB_CONNECTION_STRING}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Elasticsearch__Uri: ${ELASTIC_URI}
      AuthService__BaseUrl: http://auth-service:${SERVICE_PORT_CONTAINER}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_DEFAULT_USER}
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${METADATA_SERVICE_PORT_HOST}:${SERVICE_PORT_CONTAINER}"
    depends_on:
      postgres-metadata:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - app-network
      - db-network
      - messaging-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${SERVICE_PORT_CONTAINER}/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s

  log-service:
    container_name: ${PREFIX}_log_service
    build:
      context: ../..
      dockerfile: services/log-service/GraNAS.LogService/Dockerfile
    image: ${LOG_SERVICE_IMAGE}:${LOG_SERVICE_VERSION}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      ASPNETCORE_URLS: http://+:${SERVICE_PORT_CONTAINER}
      ConnectionStrings__DefaultConnection: ${LOG_DB_CONNECTION_STRING}
      Elasticsearch__Uri: ${ELASTIC_URI}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_DEFAULT_USER}
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${LOG_SERVICE_PORT_HOST}:${SERVICE_PORT_CONTAINER}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - app-network
      - db-network
      - messaging-network

  postgres-sharing:
    container_name: ${PREFIX}_postgres_sharing
    image: postgres:${POSTGRES_VERSION}
    environment:
      POSTGRES_DB: ${SHARING_POSTGRES_DB}
      POSTGRES_USER: ${SHARING_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SHARING_POSTGRES_PASSWORD}
    ports:
      - "${SHARING_POSTGRES_PORT_HOST}:${POSTGRES_PORT_CONTAINER}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SHARING_POSTGRES_USER} -d ${SHARING_POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - db-network
    volumes:
      - postgres_sharing_data:/var/lib/postgresql/data

  sharing-service:
    container_name: ${PREFIX}_sharing_service
    build:
      context: ../..
      dockerfile: services/sharing-service/GraNAS.Sharing.API/Dockerfile
    image: ${SHARING_SERVICE_IMAGE}:${SHARING_SERVICE_VERSION}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      ASPNETCORE_URLS: http://+:${SERVICE_PORT_CONTAINER}
      ConnectionStrings__Default: ${SHARING_DB_CONNECTION_STRING}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Elasticsearch__Uri: ${ELASTIC_URI}
      MetadataService__BaseUrl: http://metadata-service:${SERVICE_PORT_CONTAINER}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_DEFAULT_USER}
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${SHARING_SERVICE_PORT_HOST}:${SERVICE_PORT_CONTAINER}"
    depends_on:
      postgres-sharing:
        condition: service_healthy
      metadata-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - app-network
      - db-network
      - messaging-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${SERVICE_PORT_CONTAINER}/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s

  api-gateway:
    container_name: ${PREFIX}_api_gateway
    build:
      context: ../..
      dockerfile: services/api-gateway/GraNAS.Gateway/Dockerfile
    image: ${GATEWAY_SERVICE_IMAGE}:${GATEWAY_SERVICE_VERSION}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      ASPNETCORE_URLS: http://+:${SERVICE_PORT_CONTAINER}
      Cors__AllowedOrigins__0: ${WEB_CLIENT_ORIGIN}
      ReverseProxy__Clusters__auth__Destinations__d1__Address: http://auth-service:${SERVICE_PORT_CONTAINER}
      ReverseProxy__Clusters__metadata__Destinations__d1__Address: http://metadata-service:${SERVICE_PORT_CONTAINER}
      ReverseProxy__Clusters__sharing__Destinations__d1__Address: http://sharing-service:${SERVICE_PORT_CONTAINER}
    ports:
      - "${GATEWAY_PORT_HOST}:${SERVICE_PORT_CONTAINER}"
    depends_on:
      auth-service:
        condition: service_healthy
      metadata-service:
        condition: service_healthy
      sharing-service:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${SERVICE_PORT_CONTAINER}/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  db-network:
    driver: bridge
  app-network:
    driver: bridge
  messaging-network:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_metadata_data:
  postgres_sharing_data:
  elasticsearch_data:
  rabbitmq_data:
  redis_data:
