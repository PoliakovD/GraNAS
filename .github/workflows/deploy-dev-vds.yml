name: Deploy to dev VDS

on:
  push:
    branches: ["develop_vds"]
  workflow_dispatch:

concurrency:
  group: dev-vds
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev-vds
    env:
      VDS_HOST: ${{ secrets.VDS_HOST }}
      VDS_USER: ${{ secrets.VDS_USER }}
      VDS_PASSWORD: ${{ secrets.VDS_PASSWORD }}
      DOMAIN: ${{ secrets.DOMAIN }}
      CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SHARE_TOKEN_ENCRYPTION_KEY: ${{ secrets.SHARE_TOKEN_ENCRYPTION_KEY }}
      TURN_SECRET: ${{ secrets.TURN_SECRET }}
      AUTH_POSTGRES_PASSWORD: ${{ secrets.AUTH_POSTGRES_PASSWORD }}
      METADATA_POSTGRES_PASSWORD: ${{ secrets.METADATA_POSTGRES_PASSWORD }}
      SHARING_POSTGRES_PASSWORD: ${{ secrets.SHARING_POSTGRES_PASSWORD }}
      SIGNALING_POSTGRES_PASSWORD: ${{ secrets.SIGNALING_POSTGRES_PASSWORD }}
      NOTIFICATION_POSTGRES_PASSWORD: ${{ secrets.NOTIFICATION_POSTGRES_PASSWORD }}
      RABBITMQ_DEFAULT_PASS: ${{ secrets.RABBITMQ_DEFAULT_PASS }}
      DASHBOARDS_PASSWORD: ${{ secrets.DASHBOARDS_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass + rsync + apache2-utils
        run: sudo apt-get update -q && sudo apt-get install -y sshpass rsync apache2-utils

      - name: Guard required secrets
        run: |
          : "${VDS_HOST:?Secret VDS_HOST is not set}"
          : "${VDS_USER:?Secret VDS_USER is not set}"
          : "${VDS_PASSWORD:?Secret VDS_PASSWORD is not set}"
          : "${DOMAIN:?Secret DOMAIN is not set}"
          : "${JWT_SECRET:?Secret JWT_SECRET is not set}"
          : "${DASHBOARDS_PASSWORD:?Secret DASHBOARDS_PASSWORD is not set}"

      - name: Render vds.env
        working-directory: infrastructure/docker-compose
        run: |
          {
            echo "DOMAIN=$DOMAIN"
            echo "CERTBOT_EMAIL=$CERTBOT_EMAIL"
            echo "APP_BASE_URL=$DOMAIN"
            echo "SHARE_TOKEN_ENCRYPTION_KEY=$SHARE_TOKEN_ENCRYPTION_KEY"
            echo "PREFIX=dev"
            echo "ENVIRONMENT=Development"
            echo "COMPOSE_PROJECT_NAME=granas-dev"
            echo "POSTGRES_VERSION=16-alpine"
            echo "REDIS_VERSION=7.2-alpine"
            echo "OPENSEARCH_VERSION=3.6.0"
            echo "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
            echo "OPENSEARCH_PORT_HOST=9200"
            echo "OPENSEARCH_PORT_CONTAINER=9200"
            echo "OPENSEARCH_URI=http://opensearch:9200"
            echo "RABBITMQ_VERSION=4.3.0"
            echo "AUTH_POSTGRES_PORT_HOST=5433"
            echo "METADATA_POSTGRES_PORT_HOST=5434"
            echo "POSTGRES_PORT_CONTAINER=5432"
            echo "REDIS_PORT_HOST=6379"
            echo "REDIS_PORT_CONTAINER=6379"
            echo "RABBITMQ_AMQP_PORT_HOST=5672"
            echo "RABBITMQ_AMQP_PORT_CONTAINER=5672"
            echo "RABBITMQ_MANAGEMENT_PORT_HOST=15672"
            echo "RABBITMQ_MANAGEMENT_PORT_CONTAINER=15672"
            echo "AUTH_SERVICE_PORT_HOST=8081"
            echo "METADATA_SERVICE_PORT_HOST=8082"
            echo "LOG_SERVICE_PORT_HOST=8083"
            echo "SERVICE_PORT_CONTAINER=8080"
            echo "SHARING_SERVICE_PORT_HOST=8084"
            echo "SHARING_POSTGRES_PORT_HOST=5436"
            echo "SIGNALING_POSTGRES_PORT_HOST=5437"
            echo "AUTH_POSTGRES_DB=auth_dev"
            echo "AUTH_POSTGRES_USER=auth_user"
            echo "AUTH_POSTGRES_PASSWORD=$AUTH_POSTGRES_PASSWORD"
            echo "AUTH_POSTGRES_HOST=postgres-auth"
            echo "METADATA_POSTGRES_DB=metadata_dev"
            echo "METADATA_POSTGRES_USER=metadata_user"
            echo "METADATA_POSTGRES_PASSWORD=$METADATA_POSTGRES_PASSWORD"
            echo "METADATA_POSTGRES_HOST=postgres-metadata"
            echo "REDIS_HOST=redis"
            echo "REDIS_CONNECTION_STRING=redis:6379"
            echo "RABBITMQ_HOST=rabbitmq"
            echo "RABBITMQ_DEFAULT_USER=granas_dev"
            echo "RABBITMQ_DEFAULT_PASS=$RABBITMQ_DEFAULT_PASS"
            echo "JWT_SECRET=$JWT_SECRET"
            echo "JWT_ISSUER=GraNAS"
            echo "JWT_AUDIENCE=GraNASClients"
            echo "JWT_ACCESS_MINUTES=15"
            echo "JWT_REFRESH_DAYS=7"
            echo "SHARING_POSTGRES_DB=sharing_dev"
            echo "SHARING_POSTGRES_USER=sharing_user"
            echo "SHARING_POSTGRES_PASSWORD=$SHARING_POSTGRES_PASSWORD"
            echo "SHARING_POSTGRES_HOST=postgres-sharing"
            echo "AUTH_SERVICE_IMAGE=granas-auth-api"
            echo "AUTH_SERVICE_VERSION=latest"
            echo "METADATA_SERVICE_IMAGE=granas-metadata-api"
            echo "METADATA_SERVICE_VERSION=latest"
            echo "LOG_SERVICE_IMAGE=granas-log-api"
            echo "LOG_SERVICE_VERSION=latest"
            echo "SHARING_SERVICE_IMAGE=granas-sharing-api"
            echo "SHARING_SERVICE_VERSION=latest"
            echo "SIGNALING_SERVICE_IMAGE=granas-signaling-api"
            echo "SIGNALING_SERVICE_VERSION=latest"
            echo "NOTIFICATION_SERVICE_IMAGE=granas-notification-api"
            echo "NOTIFICATION_SERVICE_VERSION=latest"
            echo "GATEWAY_SERVICE_IMAGE=granas-gateway"
            echo "GATEWAY_SERVICE_VERSION=latest"
            echo "WEB_CLIENT_IMAGE=granas-web-client"
            echo "WEB_CLIENT_VERSION=latest"
            echo "AUTH_DB_CONNECTION_STRING=Host=postgres-auth;Port=5432;Database=auth_dev;Username=auth_user;Password=$AUTH_POSTGRES_PASSWORD"
            echo "METADATA_DB_CONNECTION_STRING=Host=postgres-metadata;Port=5432;Database=metadata_dev;Username=metadata_user;Password=$METADATA_POSTGRES_PASSWORD"
            echo "SHARING_DB_CONNECTION_STRING=Host=postgres-sharing;Port=5432;Database=sharing_dev;Username=sharing_user;Password=$SHARING_POSTGRES_PASSWORD"
            echo "GATEWAY_PORT_HOST=8080"
            echo "GATEWAY_SERVICE_IMAGE=granas-gateway"
            echo "GATEWAY_SERVICE_VERSION=latest"
            echo "WEB_CLIENT_ORIGIN=https://$DOMAIN"
            echo "WEB_CLIENT_PORT_HOST=5173"
            echo "VITE_API_BASE_URL=https://$DOMAIN"
            echo "SIGNALING_POSTGRES_DB=signalingdb"
            echo "SIGNALING_POSTGRES_USER=signaling"
            echo "SIGNALING_POSTGRES_PASSWORD=$SIGNALING_POSTGRES_PASSWORD"
            echo "SIGNALING_POSTGRES_HOST=postgres-signaling"
            echo "SIGNALING_DB_CONNECTION_STRING=Host=postgres-signaling;Port=5432;Database=signalingdb;Username=signaling;Password=$SIGNALING_POSTGRES_PASSWORD"
            echo "SIGNALING_SERVICE_PORT_HOST=8085"
            echo "SIGNALING_REDIS_CONNECTION_STRING=redis:6379,defaultDatabase=2"
            echo "SIGNALING_TTL_SECONDS=600"
            echo "TURN_SECRET=$TURN_SECRET"
            echo "TURN_REALM=$DOMAIN"
            echo "TURN_HOST=$VDS_HOST"
            echo "TURN_PORT=3478"
            echo "NOTIFICATION_POSTGRES_DB=notification_dev"
            echo "NOTIFICATION_POSTGRES_USER=notification_user"
            echo "NOTIFICATION_POSTGRES_PASSWORD=$NOTIFICATION_POSTGRES_PASSWORD"
            echo "NOTIFICATION_POSTGRES_HOST=postgres-notification"
            echo "NOTIFICATION_POSTGRES_PORT_HOST=5438"
            echo "NOTIFICATION_DB_CONNECTION_STRING=Host=postgres-notification;Port=5432;Database=notification_dev;Username=notification_user;Password=$NOTIFICATION_POSTGRES_PASSWORD"
            echo "NOTIFICATION_SERVICE_PORT_HOST=8086"
            echo "SMTP_HOST=mailpit"
            echo "SMTP_PORT=1025"
            echo "SMTP_USERNAME="
            echo "SMTP_PASSWORD="
            echo "SMTP_FROM=noreply@granas.local"
            echo "SMTP_USE_STARTTLS=false"
          } > vds.env

      - name: Generate nginx htpasswd
        run: |
          htpasswd -bnB admin "$DASHBOARDS_PASSWORD" \
            > infrastructure/docker-compose/nginx/htpasswd

      - name: Add VDS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VDS_HOST" >> ~/.ssh/known_hosts

      - name: Provision VDS (Docker + UFW)
        run: |
          export SSHPASS="$VDS_PASSWORD"
          sshpass -e ssh "${VDS_USER}@${VDS_HOST}" 'bash -s' << 'ENDSSH'
            set -euo pipefail
            if [ "$(id -u)" -eq 0 ]; then SUDO=""; else SUDO="sudo"; fi
            if ! command -v docker >/dev/null 2>&1; then
              echo "==> Installing Docker..."
              curl -fsSL https://get.docker.com | $SUDO sh
            fi
            $SUDO ufw allow 22/tcp
            $SUDO ufw allow 80/tcp
            $SUDO ufw allow 443/tcp
            $SUDO ufw allow 3478/udp
            $SUDO ufw allow 3478/tcp
            $SUDO ufw allow 50000:50010/udp
            $SUDO ufw --force enable
          ENDSSH

      - name: Rsync repo to VDS
        run: |
          export SSHPASS="$VDS_PASSWORD"
          sshpass -e rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='infrastructure/docker-compose/vds.env' \
            ./ "${VDS_USER}@${VDS_HOST}:/opt/granas/"

      - name: Scp vds.env to VDS
        run: |
          export SSHPASS="$VDS_PASSWORD"
          sshpass -e scp infrastructure/docker-compose/vds.env \
            "${VDS_USER}@${VDS_HOST}:/opt/granas/infrastructure/docker-compose/vds.env"

      - name: Bootstrap HTTPS certificate
        run: |
          export SSHPASS="$VDS_PASSWORD"
          sshpass -e ssh "${VDS_USER}@${VDS_HOST}" 'bash -s' << 'ENDSSH'
            set -euo pipefail
            cd /opt/granas/infrastructure/docker-compose
            bash init-letsencrypt.sh
          ENDSSH

      - name: Start services
        run: |
          export SSHPASS="$VDS_PASSWORD"
          sshpass -e ssh "${VDS_USER}@${VDS_HOST}" 'bash -s' << 'ENDSSH'
            set -euo pipefail
            cd /opt/granas/infrastructure/docker-compose
            COMPOSE="docker compose --env-file vds.env -f compose.yaml -f compose.vds.yaml"
            $COMPOSE up -d --build --remove-orphans
            $COMPOSE exec nginx nginx -s reload
            $COMPOSE ps
          ENDSSH

      - name: Smoke test
        run: |
          sleep 120 # Wait for services
          curl -fsS --max-time 10 "https://$DOMAIN/api/auth/health"
